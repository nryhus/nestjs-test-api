services:
  postgres:
    image: postgis/postgis
    platform: linux/amd64
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: api-db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: